profile:
  name: "신희찬 (Sinheechan)"
  tagline: "구조적인 파이프라인 설계와 협업을 중요시하며, 직관적인 코드를 지향하는 데이터 분석가입니다."
  image: "/assets/img/profile.jpg"

about:
  intro:
    - "안녕하세요. 경험을 통해 성장하는 데이터 엔지니어 신희찬입니다.\n"

    - "비즈니스와 사람을 좋아하는 엔지니어입니다. 다양한 도메인에 관심이 많고,"
    - "데이터 분석으로 비즈니스 성장에 기여할 때 가장 큰 보람을 느낍니다.\n"

    - "복잡한 데이터를 간결하게 풀어내고, 사람들에게 이해시키는 일을 좋아합니다."
    - "코드와 문서를 비롯한 모든 작업물에서 누구나 이해하기 쉬운 가독성을 지향합니다.\n"

    - "실무를 통해 여러 조직과 협업하며, 팀원들의 니즈를 빠르게 파악하고 효과적으로 소통하는 법을 익혔습니다."
    - "사람들과 함께 문제를 풀어가는 과정 자체를 즐기며 궁극적으로는 엔지니어링으로 세상의 문제를 해결하고, 사람들의 일상을 더 편리하게 만드는 것이 제 목표입니다."

