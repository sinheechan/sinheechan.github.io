<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" font-family="sans-serif">
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">결정 트리 구조</text>
  <!-- Root node -->
  <rect x="175" y="32" width="150" height="40" rx="6" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="250" y="50" text-anchor="middle" font-size="12" fill="#1A5276">나이 ≤ 30?</text>
  <text x="250" y="65" text-anchor="middle" font-size="10" fill="#4A90D9">루트 노드 (Root)</text>
  <!-- Branches from root -->
  <line x1="210" y1="72" x2="140" y2="115" stroke="#888" stroke-width="1.5"/>
  <line x1="290" y1="72" x2="360" y2="115" stroke="#888" stroke-width="1.5"/>
  <text x="160" y="100" font-size="11" fill="#27AE60">예 (Yes)</text>
  <text x="305" y="100" font-size="11" fill="#E74C3C">아니오 (No)</text>
  <!-- Left child node -->
  <rect x="65" y="115" width="150" height="40" rx="6" fill="#EBF5FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="140" y="133" text-anchor="middle" font-size="12" fill="#1A5276">소득 ≤ 50K?</text>
  <text x="140" y="148" text-anchor="middle" font-size="10" fill="#4A90D9">내부 노드 (Node)</text>
  <!-- Right child node -->
  <rect x="285" y="115" width="150" height="40" rx="6" fill="#EBF5FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="360" y="133" text-anchor="middle" font-size="12" fill="#1A5276">경력 ≤ 5년?</text>
  <text x="360" y="148" text-anchor="middle" font-size="10" fill="#4A90D9">내부 노드 (Node)</text>
  <!-- Branches from left child -->
  <line x1="105" y1="155" x2="80" y2="200" stroke="#888" stroke-width="1.5"/>
  <line x1="175" y1="155" x2="200" y2="200" stroke="#888" stroke-width="1.5"/>
  <!-- Branches from right child -->
  <line x1="325" y1="155" x2="300" y2="200" stroke="#888" stroke-width="1.5"/>
  <line x1="395" y1="155" x2="420" y2="200" stroke="#888" stroke-width="1.5"/>
  <!-- Leaf nodes -->
  <rect x="40" y="200" width="80" height="35" rx="6" fill="#EDFFF4" stroke="#27AE60" stroke-width="1.5"/>
  <text x="80" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E8449">승인</text>
  <rect x="160" y="200" width="80" height="35" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="200" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#922B21">거절</text>
  <rect x="260" y="200" width="80" height="35" rx="6" fill="#EDFFF4" stroke="#27AE60" stroke-width="1.5"/>
  <text x="300" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E8449">승인</text>
  <rect x="380" y="200" width="80" height="35" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="420" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#922B21">거절</text>
  <!-- Leaf label -->
  <text x="250" y="265" text-anchor="middle" font-size="10" fill="#888">리프 노드 (Leaf) = 최종 예측값</text>
</svg>
