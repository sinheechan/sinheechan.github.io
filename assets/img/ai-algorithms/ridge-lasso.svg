<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" font-family="sans-serif">
  <text x="260" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">릿지(L2) vs 라쏘(L1) 계수 비교</text>
  <!-- Labels -->
  <text x="90" y="45" text-anchor="middle" font-size="12" fill="#555">규제 없음</text>
  <text x="245" y="45" text-anchor="middle" font-size="12" fill="#4A90D9">릿지 (Ridge, L2)</text>
  <text x="400" y="45" text-anchor="middle" font-size="12" fill="#E74C3C">라쏘 (Lasso, L1)</text>
  <!-- Feature names -->
  <text x="10" y="80" font-size="10" fill="#888">w₁</text>
  <text x="10" y="115" font-size="10" fill="#888">w₂</text>
  <text x="10" y="150" font-size="10" fill="#888">w₃</text>
  <text x="10" y="185" font-size="10" fill="#888">w₄</text>
  <!-- No regularization bars -->
  <rect x="30" y="65" width="120" height="18" rx="3" fill="#95A5A6" opacity="0.8"/>
  <rect x="30" y="100" width="90" height="18" rx="3" fill="#95A5A6" opacity="0.8"/>
  <rect x="30" y="135" width="100" height="18" rx="3" fill="#95A5A6" opacity="0.8"/>
  <rect x="30" y="170" width="110" height="18" rx="3" fill="#95A5A6" opacity="0.8"/>
  <!-- Ridge bars (shrunk but not zero) -->
  <rect x="185" y="65" width="90" height="18" rx="3" fill="#4A90D9" opacity="0.8"/>
  <rect x="185" y="100" width="65" height="18" rx="3" fill="#4A90D9" opacity="0.8"/>
  <rect x="185" y="135" width="75" height="18" rx="3" fill="#4A90D9" opacity="0.8"/>
  <rect x="185" y="170" width="80" height="18" rx="3" fill="#4A90D9" opacity="0.8"/>
  <!-- Lasso bars (some shrunk to zero) -->
  <rect x="340" y="65" width="80" height="18" rx="3" fill="#E74C3C" opacity="0.8"/>
  <rect x="340" y="100" width="2" height="18" rx="1" fill="#E74C3C" opacity="0.3"/>
  <text x="345" y="113" font-size="9" fill="#E74C3C">≈ 0</text>
  <rect x="340" y="135" width="55" height="18" rx="3" fill="#E74C3C" opacity="0.8"/>
  <rect x="340" y="170" width="2" height="18" rx="1" fill="#E74C3C" opacity="0.3"/>
  <text x="345" y="183" font-size="9" fill="#E74C3C">= 0</text>
  <!-- Notes -->
  <text x="90" y="225" text-anchor="middle" font-size="10" fill="#888">계수 유지</text>
  <text x="245" y="225" text-anchor="middle" font-size="10" fill="#4A90D9">계수 축소 (0에 가까이)</text>
  <text x="400" y="225" text-anchor="middle" font-size="10" fill="#E74C3C">계수 0으로 제거 (특성 선택)</text>
  <!-- Dividers -->
  <line x1="160" y1="40" x2="160" y2="215" stroke="#eee" stroke-width="1.5"/>
  <line x1="315" y1="40" x2="315" y2="215" stroke="#eee" stroke-width="1.5"/>
</svg>
