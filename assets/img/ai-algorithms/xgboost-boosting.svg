<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 260" width="540" height="260" font-family="sans-serif">
  <text x="270" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">XGBoost — 순차적 트리 학습 (그래디언트 부스팅)</text>
  <rect x="20" y="40" width="100" height="55" rx="6" fill="#EBF4FF" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="70" y="62" text-anchor="middle" font-size="10" font-weight="bold" fill="#4A90D9">초기 예측</text>
  <text x="70" y="78" text-anchor="middle" font-size="10" fill="#555">ŷ = 평균값</text>
  <text x="70" y="90" text-anchor="middle" font-size="9" fill="#aaa">잔차 = y - ŷ</text>
  <line x1="120" y1="67" x2="148" y2="67" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="148,63 155,67 148,71" fill="#bbb"/>
  <rect x="155" y="40" width="100" height="55" rx="6" fill="#EDFFF4" stroke="#27AE60" stroke-width="1.5"/>
  <text x="205" y="62" text-anchor="middle" font-size="10" font-weight="bold" fill="#27AE60">트리 1</text>
  <text x="205" y="78" text-anchor="middle" font-size="10" fill="#555">잔차 1 학습</text>
  <text x="205" y="90" text-anchor="middle" font-size="9" fill="#aaa">오차 보정</text>
  <line x1="255" y1="67" x2="283" y2="67" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="283,63 290,67 283,71" fill="#bbb"/>
  <rect x="290" y="40" width="100" height="55" rx="6" fill="#EDFFF4" stroke="#27AE60" stroke-width="1.5"/>
  <text x="340" y="62" text-anchor="middle" font-size="10" font-weight="bold" fill="#27AE60">트리 2</text>
  <text x="340" y="78" text-anchor="middle" font-size="10" fill="#555">잔차 2 학습</text>
  <text x="340" y="90" text-anchor="middle" font-size="9" fill="#aaa">추가 보정</text>
  <line x1="390" y1="67" x2="418" y2="67" stroke="#bbb" stroke-width="1.5"/>
  <polygon points="418,63 425,67 418,71" fill="#bbb"/>
  <rect x="425" y="40" width="95" height="55" rx="6" fill="#EDFFF4" stroke="#27AE60" stroke-width="1.5"/>
  <text x="472" y="62" text-anchor="middle" font-size="10" font-weight="bold" fill="#27AE60">트리 N</text>
  <text x="472" y="78" text-anchor="middle" font-size="10" fill="#555">잔차 N 학습</text>
  <text x="472" y="90" text-anchor="middle" font-size="9" fill="#aaa">반복...</text>
  <line x1="205" y1="95" x2="205" y2="118" stroke="#F5A623" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="201,118 205,125 209,118" fill="#F5A623"/>
  <text x="218" y="112" font-size="9" fill="#F5A623">잔차 계산</text>
  <line x1="340" y1="95" x2="340" y2="118" stroke="#F5A623" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="336,118 340,125 344,118" fill="#F5A623"/>
  <rect x="20" y="133" width="500" height="38" rx="6" fill="#FEF9E7" stroke="#F5A623" stroke-width="1"/>
  <text x="270" y="150" text-anchor="middle" font-size="11" fill="#555">최종 예측 = 초기 예측 + lr&#215;트리1 + lr&#215;트리2 + ... + lr&#215;트리N</text>
  <text x="270" y="164" text-anchor="middle" font-size="10" fill="#888">(lr = learning_rate — 각 트리 기여도 조절)</text>
  <rect x="20" y="185" width="245" height="62" rx="6" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>
  <text x="143" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">XGBoost 핵심</text>
  <text x="143" y="222" text-anchor="middle" font-size="10" fill="#555">L1/L2 정규화로 과적합 방지</text>
  <text x="143" y="238" text-anchor="middle" font-size="10" fill="#555">2차 미분(Hessian) → 빠른 수렴</text>
  <rect x="275" y="185" width="245" height="62" rx="6" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>
  <text x="398" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">조기 종료</text>
  <text x="398" y="222" text-anchor="middle" font-size="10" fill="#555">검증 점수 미향상 시 자동 중지</text>
  <text x="398" y="238" text-anchor="middle" font-size="10" fill="#555">early_stopping_rounds 설정</text>
</svg>
