<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="sans-serif">
  <text x="240" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">PCA — 주성분 분석</text>
  <!-- Axes -->
  <line x1="40" y1="240" x2="440" y2="240" stroke="#bbb" stroke-width="1"/>
  <line x1="40" y1="240" x2="40" y2="40" stroke="#bbb" stroke-width="1"/>
  <text x="445" y="244" font-size="11" fill="#aaa">X₁</text>
  <text x="42" y="36" font-size="11" fill="#aaa">X₂</text>
  <!-- Data cloud (scattered dots along diagonal) -->
  <g fill="#4A90D9" opacity="0.6">
    <circle cx="100" cy="195" r="5"/><circle cx="115" cy="190" r="5"/>
    <circle cx="130" cy="185" r="5"/><circle cx="145" cy="175" r="5"/>
    <circle cx="160" cy="170" r="5"/><circle cx="175" cy="165" r="5"/>
    <circle cx="190" cy="155" r="5"/><circle cx="205" cy="148" r="5"/>
    <circle cx="220" cy="140" r="5"/><circle cx="235" cy="135" r="5"/>
    <circle cx="250" cy="125" r="5"/><circle cx="265" cy="118" r="5"/>
    <circle cx="280" cy="108" r="5"/><circle cx="295" cy="100" r="5"/>
    <circle cx="310" cy="92" r="5"/><circle cx="325" cy="85" r="5"/>
    <circle cx="340" cy="78" r="5"/>
    <!-- Scatter around the main axis -->
    <circle cx="120" cy="180" r="5"/><circle cx="150" cy="160" r="5"/>
    <circle cx="180" cy="175" r="5"/><circle cx="210" cy="138" r="5"/>
    <circle cx="240" cy="150" r="5"/><circle cx="270" cy="105" r="5"/>
    <circle cx="300" cy="115" r="5"/><circle cx="330" cy="70" r="5"/>
  </g>
  <!-- PC1 arrow (main direction of variance) -->
  <line x1="80" y1="215" x2="370" y2="65" stroke="#E74C3C" stroke-width="2.5"/>
  <polygon points="370,65 360,72 364,60" fill="#E74C3C"/>
  <text x="375" y="62" font-size="12" fill="#E74C3C" font-weight="bold">PC1</text>
  <text x="340" y="90" font-size="10" fill="#E74C3C">분산 최대 방향</text>
  <!-- PC2 arrow (perpendicular) -->
  <line x1="225" y1="58" x2="155" y2="175" stroke="#F5A623" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="155,175 160,163 152,165" fill="#F5A623"/>
  <text x="130" y="60" font-size="12" fill="#F5A623" font-weight="bold">PC2</text>
  <text x="58" y="90" font-size="10" fill="#F5A623">분산 2번째</text>
  <!-- Explanation -->
  <text x="240" y="272" text-anchor="middle" font-size="10" fill="#888">PC1이 데이터 분산을 가장 많이 설명&#160;|&#160;차원 축소 시 PC1만 선택</text>
</svg>
