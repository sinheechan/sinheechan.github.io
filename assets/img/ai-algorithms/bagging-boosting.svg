<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" font-family="sans-serif">
  <text x="280" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">배깅 vs 부스팅</text>
  <!-- Bagging section -->
  <text x="130" y="45" text-anchor="middle" font-size="13" font-weight="bold" fill="#4A90D9">배깅 (Bagging)</text>
  <!-- Data box -->
  <rect x="85" y="55" width="90" height="30" rx="5" fill="#EBF4FF" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="130" y="75" text-anchor="middle" font-size="11" fill="#1A5276">전체 데이터</text>
  <!-- Arrows to models (parallel) -->
  <line x1="95" y1="85" x2="60" y2="115" stroke="#4A90D9" stroke-width="1.5"/>
  <line x1="130" y1="85" x2="130" y2="115" stroke="#4A90D9" stroke-width="1.5"/>
  <line x1="165" y1="85" x2="200" y2="115" stroke="#4A90D9" stroke-width="1.5"/>
  <!-- Models (parallel) -->
  <rect x="30" y="115" width="60" height="28" rx="4" fill="#EBF4FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="60" y="133" text-anchor="middle" font-size="10" fill="#4A90D9">모델1</text>
  <rect x="100" y="115" width="60" height="28" rx="4" fill="#EBF4FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="130" y="133" text-anchor="middle" font-size="10" fill="#4A90D9">모델2</text>
  <rect x="170" y="115" width="60" height="28" rx="4" fill="#EBF4FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="200" y="133" text-anchor="middle" font-size="10" fill="#4A90D9">모델3</text>
  <!-- Arrows to vote -->
  <line x1="60" y1="143" x2="95" y2="172" stroke="#4A90D9" stroke-width="1.5"/>
  <line x1="130" y1="143" x2="130" y2="172" stroke="#4A90D9" stroke-width="1.5"/>
  <line x1="200" y1="143" x2="165" y2="172" stroke="#4A90D9" stroke-width="1.5"/>
  <!-- Vote box -->
  <rect x="80" y="172" width="100" height="28" rx="5" fill="#27AE60" opacity="0.2" stroke="#27AE60" stroke-width="1.5"/>
  <text x="130" y="190" text-anchor="middle" font-size="11" fill="#1E8449">다수결 투표</text>
  <text x="130" y="225" text-anchor="middle" font-size="10" fill="#888">병렬 학습 · 독립적</text>
  <!-- Boosting section -->
  <text x="420" y="45" text-anchor="middle" font-size="13" font-weight="bold" fill="#E74C3C">부스팅 (Boosting)</text>
  <!-- Sequential models -->
  <rect x="305" y="65" width="70" height="28" rx="4" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="340" y="83" text-anchor="middle" font-size="10" fill="#E74C3C">모델1</text>
  <line x1="375" y1="79" x2="405" y2="79" stroke="#E74C3C" stroke-width="1.5"/>
  <polygon points="405,75 412,79 405,83" fill="#E74C3C"/>
  <text x="390" y="72" font-size="9" fill="#888">오차 전달</text>
  <rect x="412" y="65" width="70" height="28" rx="4" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="447" y="83" text-anchor="middle" font-size="10" fill="#E74C3C">모델2</text>
  <line x1="482" y1="79" x2="512" y2="79" stroke="#E74C3C" stroke-width="1.5"/>
  <polygon points="512,75 519,79 512,83" fill="#E74C3C"/>
  <rect x="519" y="65" width="20" height="28" rx="4" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="529" y="83" text-anchor="middle" font-size="10" fill="#E74C3C">…</text>
  <!-- Final prediction -->
  <line x1="420" y1="93" x2="420" y2="155" stroke="#E74C3C" stroke-width="1.5"/>
  <rect x="360" y="155" width="120" height="28" rx="5" fill="#E74C3C" opacity="0.2" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="420" y="173" text-anchor="middle" font-size="11" fill="#922B21">가중 합산 예측</text>
  <text x="420" y="225" text-anchor="middle" font-size="10" fill="#888">순차 학습 · 오차 보정</text>
  <!-- Divider -->
  <line x1="270" y1="40" x2="270" y2="250" stroke="#eee" stroke-width="2"/>
</svg>
