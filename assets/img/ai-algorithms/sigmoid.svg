<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" font-family="sans-serif">
  <text x="250" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">시그모이드 함수 σ(z) = 1 / (1 + e⁻ᶻ)</text>
  <!-- Axes -->
  <line x1="50" y1="240" x2="460" y2="240" stroke="#999" stroke-width="1.5"/>
  <line x1="250" y1="40" x2="250" y2="250" stroke="#999" stroke-width="1.5"/>
  <!-- Arrow heads -->
  <polygon points="460,236 454,243 454,237" fill="#999"/>
  <polygon points="246,40 250,34 254,40" fill="#999"/>
  <!-- Axis labels -->
  <text x="465" y="244" font-size="12" fill="#666">z</text>
  <text x="255" y="36" font-size="12" fill="#666">σ(z)</text>
  <!-- x tick labels -->
  <text x="51" y="255" text-anchor="middle" font-size="10" fill="#888">-6</text>
  <text x="118" y="255" text-anchor="middle" font-size="10" fill="#888">-4</text>
  <text x="184" y="255" text-anchor="middle" font-size="10" fill="#888">-2</text>
  <text x="250" y="255" text-anchor="middle" font-size="10" fill="#888">0</text>
  <text x="316" y="255" text-anchor="middle" font-size="10" fill="#888">2</text>
  <text x="382" y="255" text-anchor="middle" font-size="10" fill="#888">4</text>
  <text x="449" y="255" text-anchor="middle" font-size="10" fill="#888">6</text>
  <!-- y labels -->
  <text x="43" y="130" text-anchor="end" font-size="10" fill="#888">0.5</text>
  <text x="43" y="56" text-anchor="end" font-size="10" fill="#888">1.0</text>
  <text x="43" y="244" text-anchor="end" font-size="10" fill="#888">0</text>
  <!-- Reference lines -->
  <line x1="50" y1="55" x2="460" y2="55" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="50" y1="130" x2="460" y2="130" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Sigmoid curve (approximate with path) -->
  <path d="M 51,238 C 80,236 110,230 140,218 C 160,210 180,195 200,175 C 215,160 228,148 250,130 C 272,112 285,100 300,85 C 320,65 340,52 370,46 C 400,41 430,41 449,41"
        fill="none" stroke="#4A90D9" stroke-width="2.5"/>
  <!-- Midpoint dot -->
  <circle cx="250" cy="130" r="5" fill="#E74C3C"/>
  <text x="258" y="126" font-size="10" fill="#E74C3C">σ(0)=0.5</text>
  <!-- Classification threshold annotation -->
  <text x="270" y="270" font-size="11" fill="#555">출력 ≥ 0.5 → 클래스 1 &nbsp;|&nbsp; 출력 &lt; 0.5 → 클래스 0</text>
</svg>
