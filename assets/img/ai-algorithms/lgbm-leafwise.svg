<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" width="520" height="260" font-family="sans-serif">
  <text x="260" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">LightGBM — 리프 중심 vs 레벨 중심 트리 성장</text>
  <line x1="260" y1="35" x2="260" y2="248" stroke="#eee" stroke-width="2"/>
  <text x="130" y="48" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A90D9">XGBoost</text>
  <text x="130" y="62" text-anchor="middle" font-size="10" fill="#4A90D9">레벨 중심 (Level-wise)</text>
