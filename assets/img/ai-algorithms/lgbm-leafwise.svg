  <circle cx="110" cy="170" r="10" fill="#EBF4FF" stroke="#4A90D9" stroke-width="1.5"/>
  <circle cx="150" cy="170" r="10" fill="#EBF4FF" stroke="#4A90D9" stroke-width="1.5"/>
  <circle cx="210" cy="170" r="10" fill="#EBF4FF" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="18" y="89" font-size="9" fill="#aaa">Lv0</text>
  <text x="18" y="133" font-size="9" fill="#aaa">Lv1</text>
  <text x="18" y="173" font-size="9" fill="#aaa">Lv2</text>
  <text x="130" y="200" text-anchor="middle" font-size="10" fill="#555">같은 깊이의 모든 노드 분할</text>
  <text x="130" y="215" text-anchor="middle" font-size="10" fill="#aaa">(안정적, 상대적으로 느림)</text>
  <text x="390" y="48" text-anchor="middle" font-size="12" font-weight="bold" fill="#E74C3C">LightGBM</text>
  <text x="390" y="62" text-anchor="middle" font-size="10" fill="#E74C3C">리프 중심 (Leaf-wise)</text>
  <circle cx="390" cy="85" r="14" fill="#FDEDEC" stroke="#E74C3C" stroke-width="2"/>
  <text x="390" y="89" text-anchor="middle" font-size="9" fill="#E74C3C">root</text>
  <line x1="378" y1="99" x2="340" y2="120" stroke="#E74C3C" stroke-width="1.5"/>
  <line x1="402" y1="99" x2="440" y2="120" stroke="#E74C3C" stroke-width="2"/>
  <circle cx="340" cy="130" r="12" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1" opacity="0.4"/>
