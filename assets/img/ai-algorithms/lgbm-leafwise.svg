  <line x1="430" y1="142" x2="405" y2="162" stroke="#E74C3C" stroke-width="1.5" opacity="0.4"/>
  <line x1="450" y1="142" x2="475" y2="162" stroke="#E74C3C" stroke-width="2"/>
  <circle cx="405" cy="170" r="10" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1" opacity="0.4"/>
  <circle cx="475" cy="170" r="10" fill="#FDEDEC" stroke="#E74C3C" stroke-width="2"/>
  <text x="490" y="174" font-size="11" fill="#E74C3C" font-weight="bold">&#x2191;</text>
  <text x="390" y="200" text-anchor="middle" font-size="10" fill="#555">손실 최대 감소 리프만 우선 분할</text>
  <text x="390" y="215" text-anchor="middle" font-size="10" fill="#aaa">(빠름, 소규모 데이터 과적합 주의)</text>
