<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="sans-serif">
  <text x="240" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">SVM — 최대 마진 결정 경계</text>
  <!-- Background -->
  <rect x="30" y="35" width="420" height="240" rx="6" fill="#fafafa" stroke="#eee" stroke-width="1"/>
  <!-- Class A dots (blue circles) -->
  <circle cx="80" cy="200" r="7" fill="#4A90D9" opacity="0.8"/>
  <circle cx="100" cy="230" r="7" fill="#4A90D9" opacity="0.8"/>
  <circle cx="130" cy="210" r="7" fill="#4A90D9" opacity="0.8"/>
  <circle cx="90" cy="170" r="7" fill="#4A90D9" opacity="0.8"/>
  <circle cx="60" cy="250" r="7" fill="#4A90D9" opacity="0.8"/>
  <circle cx="150" cy="190" r="7" fill="#4A90D9" opacity="0.8"/>
  <circle cx="120" cy="250" r="7" fill="#4A90D9" opacity="0.8"/>
  <!-- Class B dots (red squares) -->
  <rect x="295" y="60" width="14" height="14" fill="#E74C3C" opacity="0.8"/>
  <rect x="330" y="80" width="14" height="14" fill="#E74C3C" opacity="0.8"/>
  <rect x="360" y="55" width="14" height="14" fill="#E74C3C" opacity="0.8"/>
  <rect x="310" y="105" width="14" height="14" fill="#E74C3C" opacity="0.8"/>
  <rect x="390" y="75" width="14" height="14" fill="#E74C3C" opacity="0.8"/>
  <rect x="345" y="120" width="14" height="14" fill="#E74C3C" opacity="0.8"/>
  <rect x="410" y="100" width="14" height="14" fill="#E74C3C" opacity="0.8"/>
  <!-- Support vectors (highlighted) -->
  <circle cx="150" cy="190" r="11" fill="none" stroke="#4A90D9" stroke-width="2" stroke-dasharray="3,2"/>
  <rect x="308" y="103" width="18" height="18" fill="none" stroke="#E74C3C" stroke-width="2" stroke-dasharray="3,2"/>
  <!-- Decision boundary (hyperplane) -->
  <line x1="220" y1="50" x2="240" y2="270" stroke="#2E7D32" stroke-width="2.5"/>
  <!-- Margin lines -->
  <line x1="185" y1="50" x2="205" y2="270" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <line x1="255" y1="50" x2="275" y2="270" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>
  <!-- Margin arrow -->
  <line x1="205" y1="165" x2="255" y2="162" stroke="#F5A623" stroke-width="1.5"/>
  <polygon points="255,158 262,162 255,166" fill="#F5A623"/>
  <polygon points="205,161 198,165 205,169" fill="#F5A623"/>
  <text x="228" y="155" text-anchor="middle" font-size="11" fill="#F5A623" font-weight="bold">마진</text>
  <!-- Labels -->
  <text x="100" y="285" text-anchor="middle" font-size="11" fill="#4A90D9">● 클래스 A</text>
  <text x="350" y="285" text-anchor="middle" font-size="11" fill="#E74C3C">■ 클래스 B</text>
  <text x="240" y="285" text-anchor="middle" font-size="11" fill="#2E7D32">결정 경계</text>
</svg>
